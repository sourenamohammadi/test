<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <title>Telegram Test</title>
</head>
<body>
    <style>
        body{
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgb(7, 6, 6);
        }
        .div-main{
            margin-top: 140px;
            width: 420px;
            padding: 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            background: linear-gradient(
                145deg,
                rgba(24,24,24,.95),
                rgba(12,12,12,.95)
            );
            border: 1px solid rgba(255,255,255,.06);
            border-radius: 20px;
            box-shadow:
                0 15px 40px rgba(0,0,0,.65),
                0 0 20px rgba(255,255,255,.05);
            transition: .35s;
        }
        .div-main:hover{
            transform: translateY(-5px);
            border-color: rgba(0,191,255,.25);
            box-shadow:
                0 20px 50px rgba(0,0,0,.75),
                0 0 25px rgba(0,191,255,.15);
        }
        input{
            width: 320px;
            height: 48px;
            padding: 0 16px;
            margin-bottom: 20px;
            background: #111;
            color: white;
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 12px;
            outline: none;
            transition: .3s;
            font-size: 16px;
            box-shadow: inset 0 0 8px rgba(255,255,255,.03);
        }
        input::placeholder{
            color: rgba(255,255,255,.45);
        }
        input:focus{
            border-color: #00bfff;
            box-shadow:0 0 15px rgba(0,191,255,.4),inset 0 0 8px rgba(255,255,255,.05);
        }
        button{
            width: 320px;
            height: 48px;
            background: linear-gradient(135deg,#00bfff,#006eff);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: .25s;
            box-shadow:0 6px 20px rgba(0,140,255,.35);
        }
        button:hover{
            transform: translateY(-3px);
            box-shadow:0 10px 30px rgba(0,140,255,.5);
        }
        button:active{
            transform: scale(.97);
        }
    </style>
    <div class="div-main">
        <input id="input" placeholder="هر چی میخوای بنویس به علاوه ساعت"/>
        <button onclick="sendMessage()">ارسال پیام تست</button>
    </div>
<script>
async function sendMessage() {
    let matn = document.querySelector("#input")
    alert(matn.value)
    const BOT_TOKEN = "8687133754:AAEIvtI61moYzNCRLtsdU3-U5tUMxJkb9bU";
    const CHAT_ID = "6512853118";

    const text = matn.value;

    const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;

    const response = await fetch(url,{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            chat_id:CHAT_ID,
            text:text
        })
    });

    const data = await response.json();

    console.log(data);

    if(data.ok){
        alert("پیام ارسال شد");
    }else{
        alert("خطا: "+data.description);
    }

}
</script>

</body>
</html>
