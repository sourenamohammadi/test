<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <title>Telegram Test</title>
</head>
<body>

<button onclick="sendMessage()">ارسال پیام تست</button>

<script>
async function sendMessage() {

    const BOT_TOKEN = "8687133754:AAEIvtI61moYzNCRLtsdU3-U5tUMxJkb9bU";
    const CHAT_ID = "6512853118";

    const text = "✅ پیام تست از سایت ارسال شد.";

    const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;

    const response = await fetch(url,{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            chat_id:CHAT_ID,
            text:text
        })
    });

    const data = await response.json();

    console.log(data);

    if(data.ok){
        alert("پیام ارسال شد");
    }else{
        alert("خطا: "+data.description);
    }

}
</script>

</body>
</html>
